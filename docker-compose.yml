# Development-only compose stack.
# Production deploys only backend/ to Cloud Run and injects runtime configuration
# through Cloud Run env vars and Secret Manager, not env files baked into images.
services:
  db:
    image: postgres:17-bookworm
    container_name: 16signals
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-a16zero}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-bookworm
    container_name: redis-container
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: api-container
    build:
      context: ./backend
      dockerfile: Dockerfile
    # command: sh -c "npx prisma@6 generate && npm run start:dev"
    command: sh -c "npx prisma@6 migrate deploy && node dist/main"
    user: "node" 
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: development
      GITHUB_AUTH_ENABLED: "false"
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-a16zero}?schema=public&connection_limit=5
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    # volumes:
    #   - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: worker-container
    build:
      context: ./backend
    # command: sh -c "npx prisma@6 generate && npm run worker:dev" # you define this in package.json
    command: sh -c "node dist/worker" 
    user: "node" 
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: development
      GITHUB_AUTH_ENABLED: "false"
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-a16zero}?schema=public&connection_limit=5
      REDIS_URL: redis://redis:6379
    # volumes:
    #   - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data: 
  # api_node_modules:      
  # worker_node_modules:
